<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>User Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            padding: 30px;
        }

        h2 {
            margin-top: 30px;
        }

        button {
            padding: 6px 10px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        input {
            padding: 7px;
            margin-right: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #eee;
        }

        .logout {
            background: red;
            float: right;
        }
    </style>
</head>

<body>

    <button class="logout" onclick="logout()">Logout</button>
    <h1>User Dashboard</h1>

    <h2>Search Book</h2>
    <input id="search" placeholder="Search book name">
    <button onclick="searchBook()">Search</button>
    <button onclick="loadBooks()">Reset</button>

    <h2>Available Books</h2>
    <table>
        <thead>
            <tr>
                <th>Book</th>
                <th>Author</th>
                <th>Available</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="books"></tbody>
    </table>

    <h2>My Issued Books</h2>
    <table>
        <thead>
            <tr>
                <th>Book</th>
                <th>Issued Time</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="issued"></tbody>
    </table>

    <h2>Returned Books</h2>
    <table>
        <thead>
            <tr>
                <th>Book</th>
                <th>Issued At</th>
                <th>Returned On</th>
                <th>Fine</th>
            </tr>
        </thead>
        <tbody id="returned"></tbody>
    </table>

    <script>
        const token = localStorage.getItem("token");

        async function loadBooks() {
            try {
                const res = await axios.get("http://localhost:3000/books/all", { headers: { authorization: token } });
                books.innerHTML = "";
                res.data.forEach(b => {
                    books.innerHTML += `<tr>
<td>${b.bookName}</td>
<td>${b.author}</td>
<td>${b.availableCopies}</td>
<td><button onclick="issue(${b.id})">Issue</button></td>
</tr>`;
                });
            } catch (err) {
                alert("Error loading books");
                console.error(err);
            }
        }

        async function searchBook() {
            try {
                const q = search.value;
                const res = await axios.get(`http://localhost:3000/books/search?q=${q}`, { headers: { authorization: token } });
                books.innerHTML = "";
                res.data.forEach(b => {
                    books.innerHTML += `<tr>
<td>${b.bookName}</td>
<td>${b.author}</td>
<td>${b.availableCopies}</td>
<td><button onclick="issue(${b.id})">Issue</button></td>
</tr>`;
                });
            } catch (err) {
                alert("Error searching books");
                console.error(err);
            }
        }

        async function issue(id) {
            try {
                const res = await axios.post("http://localhost:3000/books/issue", { bookId: id }, { headers: { authorization: token } });
                alert(res.data.message || "Book Issued Successfully");
                await loadBooks();
                await loadIssued();
            } catch (err) {
                alert(err.response?.data?.message || "Error issuing book");
            }
        }

        async function loadIssued() {
            try {
                const res = await axios.get("http://localhost:3000/books/my", { headers: { authorization: token } });
                issued.innerHTML = "";
                res.data.forEach(b => {
                    issued.innerHTML += `<tr>
<td>${b.Book.bookName}</td>
<td>${new Date(b.issuedAt).toLocaleString()}</td>
<td><button onclick="returnBook(${b.id})">Return</button></td>
</tr>`;
                });
            } catch (err) {
                alert("Error loading issued books");
            }
        }

        async function returnBook(id) {
            try {
                const res = await axios.get(`http://localhost:3000/books/return/${id}`, { headers: { authorization: token } });
                const fine = res.data.fine;
                if (fine > 0 && confirm(`Fine ₹${fine} . Pay now?`)) {
                    await axios.post(`http://localhost:3000/books/pay/${id}`, {}, { headers: { authorization: token } });
                    alert("Book returned successfully");
                } else if (fine === 0) {
                    await axios.post(`http://localhost:3000/books/pay/${id}`, {}, { headers: { authorization: token } });
                    alert("Book returned successfully");
                }
                await loadBooks();
                await loadIssued();
                await loadReturned();
            } catch (err) {
                alert("Error returning book");
            }
        }

        async function loadReturned() {
            try {
                const res = await axios.get("http://localhost:3000/books/returned", { headers: { authorization: token } });
                returned.innerHTML = "";
                res.data.forEach(b => {
                    returned.innerHTML += `<tr>
<td>${b.bookName}</td>
<td>${new Date(b.issuedAt).toLocaleString()}</td>
<td>${new Date(b.returnedOn).toLocaleString()}</td>
<td>₹${b.fine}</td>
</tr>`;
                });
            } catch (err) {
                alert("Error loading returned books");
            }
        }

        function logout() {
            localStorage.removeItem("token");
            window.location = "login.html";
        }

        loadBooks();
        loadIssued();
        loadReturned();
    </script>

</body>

</html>
