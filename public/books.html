<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Library Management</title>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f5f7;
      padding: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    .box {
      background: #fff;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
    }

    input {
      padding: 8px;
      width: 250px;
    }

    button {
      padding: 6px 12px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }

    th {
      background: #f0f0f0;
    }

    .pay-row {
      background: #ffecec;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Issue Book</h2>
  <input type="text" id="bookName" placeholder="Enter book name" />
  <button onclick="issueBook()">Issue</button>
</div>

<!-- ISSUED BOOKS -->
<div class="box">
  <h2>Issued Books</h2>
  <table>
    <thead>
      <tr>
        <th>Book Name</th>
        <th>Issued At</th>
        <th>Returned At</th>
        <th>Fine</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="issuedBooks"></tbody>
  </table>
</div>

<div class="box">
  <h2>Returned Books</h2>
  <table>
    <thead>
      <tr>
        <th>Book Name</th>
        <th>Returned On</th>
        <th>Fine</th>
      </tr>
    </thead>
    <tbody id="returnedBooks"></tbody>
  </table>
</div>

<script>
const BASE_URL = "http://localhost:3000/books";

function issueBook() {
  const bookName = document.getElementById('bookName').value.trim();
  if (!bookName) return alert('Enter book name');

  axios.post(`${BASE_URL}/issue`, { bookName })
    .then(() => {
      document.getElementById('bookName').value = '';
      loadIssuedBooks();
    });
}

function loadIssuedBooks() {
  axios.get(`${BASE_URL}/issued`)
    .then(res => {
      const tbody = document.getElementById('issuedBooks');
      tbody.innerHTML = '';

      res.data.forEach(book => {
        const tr = document.createElement('tr');
        tr.id = `row-${book.id}`;

        tr.innerHTML = `
          <td>${book.bookName}</td>
          <td>${formatDate(book.issuedAt)}</td>
          <td>${formatDate(book.returnedAt)}</td>
          <td>₹${book.fine}</td>
          <td>
            <button onclick="returnBook(${book.id})">Return</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    });
}

function returnBook(id) {
  axios.get(`${BASE_URL}/return/${id}`)
    .then(res => {
      const row = document.getElementById(`row-${id}`);
      row.className = 'pay-row';
      row.innerHTML = `
        <td colspan="4">
          <strong>Fine:</strong> ₹${res.data.fine}
          &nbsp;&nbsp;
          <button onclick="payFine(${id})">Pay</button>
        </td>
      `;
    });
}

function payFine(id) {
  axios.post(`${BASE_URL}/pay/${id}`)
    .then(() => {
      loadIssuedBooks();
      loadReturnedBooks();
    });
}

function loadReturnedBooks() {
  axios.get(`${BASE_URL}/returned`)
    .then(res => {
      const tbody = document.getElementById('returnedBooks');
      tbody.innerHTML = '';

      res.data.forEach(book => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${book.bookName}</td>
          <td>${formatDate(book.returnedOn)}</td>
          <td>₹${book.fine}</td>
        `;
        tbody.appendChild(tr);
      });
    });
}

function formatDate(date) {
  return new Date(date).toLocaleString();
}

loadIssuedBooks();
loadReturnedBooks();
</script>

</body>
</html>
